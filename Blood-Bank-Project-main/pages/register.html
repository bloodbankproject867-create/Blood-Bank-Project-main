<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="stylesheet" href="../assets/styles.css">
    </head>
    <body>
    <header class="site-header glass">
        <a class="brand" href="../index.html">🩸 BloodCare</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main class="page card">
        <h2>Create Account</h2>
        <p class="muted">Join as donor, hospital, or recipient.</p>
        <form>
            <label>Full Name<input placeholder="Enter full name"></label>
            <label>Phone<input placeholder="+8801XXXXXXXXX"></label>
            <label>Blood Group
                <select>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
                </select></label>
            <label>Address<input placeholder="City, area"></label>
            <button class="btn" type="button">Create Account</button>
        </form>
    </main>
    </body>
</html>
